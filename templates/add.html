<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Candidate</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Candidate Screening & Ranking System</h1>
        <p>Add New Candidate Details</p>
    </div>

    <!-- MAIN CARD -->
    <div class="form-box">

        <span class="badge">New Entry</span>

        <h2>➕ Add Candidate</h2>

        <form method="POST" id="addCandidateForm">

            <!-- BASIC -->
            <h3>Basic Details</h3>
            <input type="text" name="name" placeholder="Full Name" required>

            <!-- ACADEMICS -->
            <h3>Academic Performance</h3>
            <input type="number" step="0.01" name="class10" placeholder="Class 10 %" required>
            <input type="number" step="0.01" name="class12" placeholder="Class 12 %" required>
            <input type="number" step="0.01" name="cgpa" placeholder="CGPA (0 - 10)" required>

            <!-- PROJECTS -->
            <h3>Projects & Hackathons</h3>
            <input type="number" name="projects" placeholder="Number of Projects" required>
            <input type="number" name="hackathons_count" placeholder="Hackathons Participated" required>

            <select name="hackathon_position">
                <option value="">Select Hackathon Position</option>
                <option value="participant">Participant</option>
                <option value="finalist">Finalist</option>
                <option value="runner-up">Runner-up</option>
                <option value="winner">Winner</option>
            </select>

            <!-- CODING -->
            <h3>Coding Profiles</h3>
            <input type="number" name="leetcode" placeholder="LeetCode Score" required>
            <input type="number" name="codechef" placeholder="CodeChef Score" required>
            <input type="number" name="hackerrank" placeholder="HackerRank Score" required>

            <!-- SKILLS -->
            <h3>Skills & Experience</h3>
            <input type="text" name="skills" placeholder="Skills (comma separated)" required>
            <input type="text" name="experience" placeholder="Experience (e.g. 2 years or NA)" required>

            <!-- SUBMIT -->
            <button type="submit" class="btn">🚀 Submit Candidate</button>

        </form>

    </div>

    <!-- BACK BUTTON -->
    <a href="/" class="back-home">⬅ Back to Dashboard</a>
    <!-- LOGOUT -->
    <div style="text-align:center; margin-top:20px;">
        <form action="/logout" method="GET">
            <button class="logout-btn">Log Out</button>
        </form>
    </div>

</body>
</html>
